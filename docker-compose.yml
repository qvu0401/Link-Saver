services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - database:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=60

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - BACKEND_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  database:
