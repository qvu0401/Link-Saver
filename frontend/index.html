<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Saver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Link Saver</h1>
            <p>Save and organize your links</p>
        </header>

        <div class="card">
            <div class="section-label">Add a link</div>
            <div class="form-row">
                <div class="input-group">
                    <input type="text" id="url-input" placeholder="Paste a URL...">
                    <span class="url-status" id="url-status"></span>
                </div>
                <input type="text" id="tags-input" placeholder="tags, comma, separated">
                <select id="status-input">
                    <option value="unread">Read Later</option>
                    <option value="read">Read</option>
                </select>
                <button class="btn-primary" id="add-button">Save</button>
            </div>
        </div>

        <div class="card">
            <div class="section-label">Filter</div>
            <div class="filter-row">
                <input type="text" id="search-input" placeholder="Search titles...">
                <input type="text" id="tag-filter" placeholder="Filter by tag">
                <select id="status-filter">
                    <option value="">Read &amp; Unread</option>
                    <option value="unread">Unread</option>
                    <option value="read">Read</option>
                </select>
                <button class="btn-primary" id="filter-button">Filter</button>
            </div>
        </div>

        <div class="links-header">
            <h2>Your links</h2>
            <span class="links-count" id="links-count"></span>
        </div>

        <div id="links"></div>
    </div>

    <script>
        let allLinks = [];

        async function loadLinks() {
            const response = await fetch("/api/links");
            allLinks = await response.json();
            applyFilters();
        }

        function applyFilters() {
            const searchText = document.getElementById("search-input").value.trim().toLowerCase();
            const tagFilter = document.getElementById("tag-filter").value.trim().toLowerCase();
            const statusFilter = document.getElementById("status-filter").value;

            let filtered = allLinks;

            if (searchText) {
                filtered = filtered.filter(link =>
                    link.title.toLowerCase().includes(searchText)
                );
            }

            if (tagFilter) {
                const filterTags = tagFilter
                    .split(",")
                    .map(t => t.trim().toLowerCase())
                    .filter(t => t.length > 0);

                filtered = filtered.filter(link => {
                    const linkTags = link.tags.map(t => t.toLowerCase());
                    return filterTags.every(ft =>
                        linkTags.some(lt => lt === ft)
                    );
                });
            }

            if (statusFilter) {
                filtered = filtered.filter(link => link.status === statusFilter);
            }

            renderLinks(filtered);
        }

        function renderLinks(links) {
            const container = document.getElementById("links");
            const countEl = document.getElementById("links-count");
            container.innerHTML = "";

            countEl.textContent = links.length === 1 ? "1 link" : `${links.length} links`;

            if (links.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No links found.</p></div>';
                return;
            }

            for (const link of links) {
                const item = document.createElement("div");
                item.className = "link-item";

                // Title row
                const titleRow = document.createElement("div");
                titleRow.className = "link-title";
                const a = document.createElement("a");
                a.href = link.url;
                a.textContent = link.title;
                a.target = "_blank";
                a.rel = "noopener noreferrer";
                titleRow.appendChild(a);

                // Meta row
                const meta = document.createElement("div");
                meta.className = "link-meta";

                const statusBadge = document.createElement("span");
                statusBadge.className = `badge ${link.status === "read" ? "badge-read" : "badge-unread"}`;
                statusBadge.textContent = link.status === "read" ? "Read" : "Unread";
                meta.appendChild(statusBadge);

                for (const tag of link.tags) {
                    const tagEl = document.createElement("span");
                    tagEl.className = "tag";
                    tagEl.textContent = tag;
                    meta.appendChild(tagEl);
                }

                const dateEl = document.createElement("span");
                dateEl.className = "link-date";
                dateEl.textContent = new Date(link.date).toLocaleDateString(undefined, {
                    year: "numeric", month: "short", day: "numeric"
                });
                meta.appendChild(dateEl);

                // Divider
                const divider = document.createElement("hr");
                divider.className = "link-divider";

                // Actions row
                const actions = document.createElement("div");
                actions.className = "link-actions";

                const readBtn = document.createElement("button");
                readBtn.className = `btn-toggle-read${link.status === "read" ? " is-read" : ""}`;
                readBtn.textContent = link.status === "read" ? "Mark unread" : "Mark read";
                readBtn.addEventListener("click", () => toggleRead(link));

                const titleBtn = document.createElement("button");
                titleBtn.className = "btn-ghost";
                titleBtn.textContent = "Edit title";
                titleBtn.addEventListener("click", () => editTitle(link));

                const tagsBtn = document.createElement("button");
                tagsBtn.className = "btn-ghost";
                tagsBtn.textContent = "Edit tags";
                tagsBtn.addEventListener("click", () => editTags(link));

                const deleteBtn = document.createElement("button");
                deleteBtn.className = "btn-danger";
                deleteBtn.textContent = "Delete";
                deleteBtn.addEventListener("click", () => deleteLink(link.id));

                actions.appendChild(readBtn);
                actions.appendChild(titleBtn);
                actions.appendChild(tagsBtn);
                actions.appendChild(deleteBtn);

                item.appendChild(titleRow);
                item.appendChild(meta);
                item.appendChild(divider);
                item.appendChild(actions);
                container.appendChild(item);
            }
        }

        async function addLink() {
            const urlInput = document.getElementById("url-input");
            const tagsInput = document.getElementById("tags-input");
            const statusInput = document.getElementById("status-input");

            const url = urlInput.value.trim();
            if (!url) {
                alert("Please enter a URL");
                return;
            }

            const tags = tagsInput.value
                .split(",")
                .map(t => t.trim())
                .filter(t => t.length > 0);

            const response = await fetch("/api/links", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url, tags, status: statusInput.value })
            });

            if (!response.ok) {
                try {
                    const errorData = await response.json();
                    alert(errorData.detail || "Failed to save link");
                } catch (e) {
                    alert("Failed to save link");
                }
                return;
            }

            urlInput.value = "";
            tagsInput.value = "";
            document.getElementById("url-status").textContent = "";
            document.getElementById("url-status").className = "url-status";
            loadLinks();
        }

        async function toggleRead(link) {
            const newStatus = link.status === "read" ? "unread" : "read";
            const response = await fetch(`/api/links/${link.id}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status: newStatus })
            });
            if (!response.ok) {
                alert("Failed to update status");
                return;
            }
            loadLinks();
        }

        async function deleteLink(id) {
            if (!confirm("Delete this link?")) return;
            const response = await fetch(`/api/links/${id}`, { method: "DELETE" });
            if (!response.ok) {
                alert("Failed to delete");
                return;
            }
            loadLinks();
        }

        async function editTags(link) {
            const current = link.tags.join(", ");
            const input = prompt("Edit tags (comma separated):", current);
            if (input === null) return;

            const tags = input
                .split(",")
                .map(t => t.trim())
                .filter(t => t.length > 0);

            const response = await fetch(`/api/links/${link.id}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ tags })
            });
            if (!response.ok) {
                alert("Failed to update tags");
                return;
            }
            loadLinks();
        }

        async function editTitle(link) {
            const input = prompt("Enter a new title:");
            if (input === null || input === "") return;

            const response = await fetch(`/api/links/${link.id}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title: input })
            });
            if (!response.ok) {
                alert("Failed to update title");
                return;
            }
            loadLinks();
        }

        function validateURL() {
            const urlInput = document.getElementById("url-input");
            const urlStatus = document.getElementById("url-status");
            const value = urlInput.value.trim();

            if (value === "") {
                urlStatus.textContent = "";
                urlStatus.className = "url-status";
                return;
            }

            if (URL.canParse(value)) {
                urlStatus.textContent = "valid URL";
                urlStatus.className = "url-status valid";
            } else {
                urlStatus.textContent = "not a valid URL";
                urlStatus.className = "url-status invalid";
            }
        }

        loadLinks();

        document.getElementById("add-button").addEventListener("click", addLink);
        document.getElementById("url-input").addEventListener("input", validateURL);
        document.getElementById("filter-button").addEventListener("click", applyFilters);
    </script>
</body>
</html>
